<!DOCTYPE html>
<html>
<head>
    <title>File Upload App</title>
</head>
<body>

<h1>Flask File Upload App</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">

    <input type="file" name="file" required>

    <button type="submit">
        Upload
    </button>

</form>

<hr>

<h2>Uploaded Files</h2>

<ul>
    {% for file in files %}
        <li>{{ file }}</li>
    {% endfor %}
</ul>

</body>
</html>
